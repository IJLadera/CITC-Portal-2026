<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#00AA00" opacity="0.1" stroke="#00AA00" stroke-width="2"/>
  
  <!-- Light bulb (for energy/power) -->
  <ellipse cx="50" cy="30" rx="12" ry="14" fill="#FFD700" stroke="#FFA500" stroke-width="1.5"/>
  
  <!-- Bulb base -->
  <rect x="45" y="43" width="10" height="3" fill="#333" stroke="#000" stroke-width="0.5"/>
  
  <!-- Watts symbol (W in circuit context) -->
  <text x="50" y="75" font-size="24" font-weight="bold" text-anchor="middle" fill="#00AA00" font-family="Arial">W</text>
  
  <!-- IoT connection nodes (small dots) -->
  <circle cx="25" cy="50" r="3" fill="#00AA00" opacity="0.7"/>
  <circle cx="75" cy="50" r="3" fill="#00AA00" opacity="0.7"/>
  <circle cx="50" cy="20" r="3" fill="#00AA00" opacity="0.7"/>
  <circle cx="50" cy="85" r="3" fill="#00AA00" opacity="0.7"/>
  
  <!-- Connection lines -->
  <line x1="28" y1="50" x2="42" y2="50" stroke="#00AA00" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="50" x2="72" y2="50" stroke="#00AA00" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="23" x2="50" y2="40" stroke="#00AA00" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="55" x2="50" y2="80" stroke="#00AA00" stroke-width="1" opacity="0.5"/>
</svg>
